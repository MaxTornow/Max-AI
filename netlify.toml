[build]
  command = "chmod +x build.sh && ./build.sh"
  publish = "dist"

# FastSaver API via Netlify Function (requires API key from env)
[[redirects]]
  from = "/api/fastsaver/fetch"
  to = "/.netlify/functions/fastsaver-fetch"
  status = 200
  force = true

# TikWM API proxy for TikTok video info (returns accessible CDN URLs)
[[redirects]]
  from = "/api/tikwm"
  to = "/.netlify/functions/tikwm-fetch"
  status = 200
  force = true

# Proxy for video downloads to handle HTTP/HTTPS mixed content
[[redirects]]
  from = "/api/video-proxy/*"
  to = "/.netlify/functions/video-proxy"
  status = 200
  force = true

# Claude API via Edge Function (API key stays server-side)
[[edge_functions]]
  path = "/api/claude-generate"
  function = "claude-generate"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200