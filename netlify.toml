[build]
  command = "chmod +x build.sh && ./build.sh"
  publish = "dist"

# COOP/COEP headers required for ffmpeg.wasm SharedArrayBuffer
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

# FastSaver API via Netlify Function (requires API key from env)
[[redirects]]
  from = "/api/fastsaver/fetch"
  to = "/.netlify/functions/fastsaver-fetch"
  status = 200
  force = true

# Proxy for video downloads to handle HTTP/HTTPS mixed content
[[redirects]]
  from = "/api/video-proxy/*"
  to = "/.netlify/functions/video-proxy"
  status = 200
  force = true

# Proxy for Claude API with the required header
[[redirects]]
  from = "/api/claude/*"
  to = "https://api.anthropic.com/:splat"
  status = 200
  force = true
  headers = {X-From-Netlify = "true", anthropic-dangerous-direct-browser-access = "true"}

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200